        .dot { width: 12px; height: 12px; border-radius: 50%; }

        .canteen-container {
            display: flex; gap: 15px; padding: 40px; background: var(--card); border-radius: 20px;

        .col { display: flex; flex-direction: column; align-items: center; padding: 0 25px 20px 25px; border-right: 1px dashed #cfd8dc; }
        .col.compact { gap: 10px; }
        .col.spread { gap: 110px; }

        .hallway {
            width: 80px; background: var(--hallway); display: flex; align-items: center; justify-content: center;

        .booth { width: 85px; height: 160px; background: var(--brown); border-radius: 40px; }
        .round { width: 60px; height: 60px; background: var(--circle); border-radius: 50%; }

        .seat {
            width: 14px; height: 14px; background: var(--green); border-radius: 50%;
            position: absolute; cursor: pointer; border: 2px solid white; z-index: 10;
        }
        
        .seat.selected { background: var(--selected) !important; border-color: #000; transform: scale(1.2); }
        .seat.occupied { background: var(--red) !important; cursor: not-allowed; pointer-events: none; }

        .n-l1 { left: -18px; top: 8%; } .n-r1 { right: -18px; top: 8%; }

    <script>
        const SUPABASE_URL = 'https://oabnsljzofamnglzrtpl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hYm5zbGp6b2ZhbW5nbHpydHBsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzMxMzIsImV4cCI6MjA5MDE0OTEzMn0.0_Ah2SNokwgaIJWEyFERvCKsJz9cFsP3FTBARrDcKHo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. Give every seat a unique ID so we can remember it
        document.querySelectorAll('.seat').forEach((s, i) => s.id = 'seat-' + i);

        let selectedSeats = new Set();
        const confirmBtn = document.getElementById('confirm');
        const nameInput = document.getElementById('student-name');

        // 2. Handle Clicking
        document.getElementById('canteen').addEventListener('click', (e) => {
            if (e.target.classList.contains('seat') && !e.target.classList.contains('occupied')) {
                const id = e.target.id;
                if (selectedSeats.has(id)) {
                    selectedSeats.delete(id);
                    e.target.classList.remove('selected');
                } else {
                    selectedSeats.add(id);
                    e.target.classList.add('selected');
                }
                updateUI();
            }
        });

        function updateUI() {
            confirmBtn.disabled = !(selectedSeats.size > 0 && nameInput.value.trim().length > 0);
        }

        // 3. Confirm & Save to Supabase
        async function confirmReservation() {
            const name = nameInput.value.trim();
            confirmBtn.disabled = true;
            confirmBtn.innerText = "Saving...";

            const { error } = await _supabase
                .from('reservations')
                .insert([{ student_name: name, seat_ids: Array.from(selectedSeats) }]);

            if (!error) {
                // Change UI locally to Red
                selectedSeats.forEach(id => {
                    const el = document.getElementById(id);
                    el.classList.remove('selected');
                    el.classList.add('occupied');
                });
                selectedSeats.clear();
                nameInput.value = "";
                confirmBtn.innerText = "Confirm Reservation";
                alert("Success! Seats are now occupied.");
                updateUI();
            } else {
                alert("Error: " + error.message);
                confirmBtn.disabled = false;
                confirmBtn.innerText = "Confirm Reservation";
            }
        }

        // 4. Load Occupied Seats and Listen for updates
        async function loadOccupied() {
            const { data } = await _supabase.from('reservations').select('seat_ids');
            if (data) {
                data.forEach(res => {
                    if(res.seat_ids) {
                        res.seat_ids.forEach(id => {
                            const el = document.getElementById(id);
                            if (el) el.classList.add('occupied');
                        });
                    }
                });
            }
        }

        // Listen for other people booking (Real-time)
        _supabase
            .channel('any')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'reservations' }, (payload) => {
                payload.new.seat_ids.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.classList.add('occupied');
                });
            })
            .subscribe();

        loadOccupied();
    </script>
